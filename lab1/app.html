<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер часу - SessionTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 flex flex-col min-h-screen font-sans">

    <header class="bg-slate-800 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-500 tracking-wide">
                SessionTracker
            </div>
            <nav>
                <ul class="flex space-x-6">
                    <li><a href="index.html" class="hover:text-blue-400 transition">Вхід</a></li>
                    <li><a href="register.html" class="hover:text-blue-400 transition">Реєстрація</a></li>
                    <li><a href="app.html" class="text-blue-400 font-semibold hover:text-blue-300 transition">Додаток</a></li>
                    <li><a href="profile.html" class="hover:text-blue-400 transition">Профіль</a></li>
                    <li><a href="about.html" class="hover:text-blue-400 transition">Про додаток</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 bg-slate-800 p-8 rounded-lg shadow-lg border border-slate-700 flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-4 text-slate-300">Новий сеанс</h2>
                
                <input type="text" placeholder="Назва задачі..." class="w-full px-4 py-2 mb-6 bg-slate-700 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400 text-center">
                
                <div class="text-6xl font-mono font-bold text-blue-400 mb-8 tracking-wider">
                    00:00:00
                </div>
                
                <div class="flex space-x-3 w-full">
                    <button class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-md transition duration-200">
                        Старт
                    </button>
                    <button class="flex-1 bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-4 rounded-md transition duration-200">
                        Пауза
                    </button>
                    <button class="flex-1 bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 px-4 rounded-md transition duration-200">
                        Стоп
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-slate-800 p-8 rounded-lg shadow-lg border border-slate-700">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">Збережені сеанси</h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-600 text-slate-400">
                                <th class="py-3 px-4 font-medium">Назва сеансу</th>
                                <th class="py-3 px-4 font-medium">Початок</th>
                                <th class="py-3 px-4 font-medium">Завершення</th>
                                <th class="py-3 px-4 font-medium text-right">Тривалість</th>
                            </tr>
                        </thead>
                        <tbody class="text-slate-300">
                            <tr class="border-b border-slate-700 hover:bg-slate-750 transition">
                                <td class="py-3 px-4">Тест 1</td>
                                <td class="py-3 px-4 text-sm text-slate-400">14:00</td>
                                <td class="py-3 px-4 text-sm text-slate-400">16:30</td>
                                <td class="py-3 px-4 text-right font-mono text-blue-400">02:30:00</td>
                            </tr>
                            <tr class="border-b border-slate-700 hover:bg-slate-750 transition">
                                <td class="py-3 px-4">Тест 2</td>
                                <td class="py-3 px-4 text-sm text-slate-400">18:15</td>
                                <td class="py-3 px-4 text-sm text-slate-400">19:00</td>
                                <td class="py-3 px-4 text-right font-mono text-blue-400">00:45:00</td>
                            </tr>
                            <tr class="hover:bg-slate-750 transition">
                                <td class="py-3 px-4">Тест 3</td>
                                <td class="py-3 px-4 text-sm text-slate-400">20:00</td>
                                <td class="py-3 px-4 text-sm text-slate-400">20:55</td>
                                <td class="py-3 px-4 text-right font-mono text-blue-400">00:55:00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </main>

    <footer class="bg-slate-950 text-center py-4 text-slate-500 text-sm">
        <p>&copy; 2026 SessionTracker. Усі права захищено.</p>
    </footer>

</body>
</html>
