<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - SessionTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 flex flex-col min-h-screen font-sans">

    <header class="bg-slate-800 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-500 tracking-wide">
                SessionTracker
            </div>
            <nav>
                <ul class="flex space-x-6">
                    <li><a href="index.html" class="hover:text-blue-400 transition">Вхід</a></li>
                    <li><a href="register.html" class="text-blue-400 font-semibold hover:text-blue-300 transition">Реєстрація</a></li>
                    <li><a href="app.html" class="hover:text-blue-400 transition">Додаток</a></li>
                    <li><a href="profile.html" class="hover:text-blue-400 transition">Профіль</a></li>
                    <li><a href="about.html" class="hover:text-blue-400 transition">Про додаток</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-10 flex justify-center items-center">
        <div class="bg-slate-800 p-8 rounded-lg shadow-lg w-full max-w-md border border-slate-700">
            <h1 class="text-3xl font-bold mb-6 text-center text-white">Реєстрація</h1>
            <form action="#" method="GET" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-400 mb-1">Ім'я</label>
                    <input type="text" id="name" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-white transition" required>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-400 mb-1">Email адреса</label>
                    <input type="email" id="email" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-white transition" required>
                </div>
                <div>
                    <label for="gender" class="block text-sm font-medium text-slate-400 mb-1">Стать</label>
                    <select id="gender" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-white transition" required>
                        <option value="">Оберіть стать</option>
                        <option value="male">Чоловіча</option>
                        <option value="female">Жіноча</option>
                    </select>
                </div>
                <div>
                    <label for="dob" class="block text-sm font-medium text-slate-400 mb-1">Дата народження</label>
                    <input type="date" id="dob" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-white transition" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-4 rounded-md transition duration-200 mt-4">
                    Створити акаунт
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-slate-950 text-center py-4 text-slate-500 text-sm">
        <p>&copy; 2026 SessionTracker. Усі права захищено.</p>
    </footer>

</body>
</html>
